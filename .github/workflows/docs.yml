name: docs

# Builds the MkDocs site only (strict). Publishing to GitHub Pages is optional;
# enable Settings → Pages → GitHub Actions if you want https://<user>.github.io/<repo>/.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install docs extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"
      - name: Build site (strict)
        run: mkdocs build --strict
