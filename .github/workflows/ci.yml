name: CI (next)

on:
  push:
    branches: [next]
  pull_request:
    branches: [next]

concurrency:
  group: ci-next-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install dev deps
        run: uv sync --extra dev
      - name: Ruff check
        run: uv run ruff check src tests
      - name: Ruff format check
        run: uv run ruff format --check src tests
      - name: Mypy
        run: uv run mypy src/topicvisexplorer

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install package + dev deps
        run: uv sync --extra dev
      - name: Run unit + golden + api tests
        run: |
          uv run pytest tests/unit tests/golden tests/api \
            --cov=topicvisexplorer \
            --cov-report=term-missing \
            --cov-report=xml \
            -q
        env:
          PYTHONHASHSEED: "0"
      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Build wheel + sdist
        run: uv build
      - name: Check distribution metadata
        run: uv run --with twine twine check dist/*
      - name: Verify legacy assets are in the wheel
        run: |
          uv run python -c "
          import zipfile, glob, sys
          whl = glob.glob('dist/*.whl')[0]
          names = zipfile.ZipFile(whl).namelist()
          required = ['topicvisexplorer/web/legacy/templates/index.html']
          missing = [n for n in required if n not in names]
          if missing:
              sys.exit('Missing from wheel: ' + ', '.join(missing))
          print('Wheel contains all expected web/legacy/ artifacts.')
          "
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
