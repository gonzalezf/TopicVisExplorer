name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

env:
  CI_PYTHON: "3.11"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install dev deps (pinned Python)
        run: |
          uv python install ${{ env.CI_PYTHON }}
          uv sync --extra dev --python ${{ env.CI_PYTHON }}
      - name: Ruff check
        run: uv run --python ${{ env.CI_PYTHON }} ruff check src tests
      - name: Ruff format check
        run: uv run --python ${{ env.CI_PYTHON }} ruff format --check src tests
      - name: Mypy
        run: uv run --python ${{ env.CI_PYTHON }} mypy src/topicvisexplorer

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install Python + package (dev matrix)
        run: |
          uv python install ${{ matrix.python-version }}
          uv sync --extra dev --python ${{ matrix.python-version }}
      - name: Run unit + golden + api tests
        run: |
          uv run --python ${{ matrix.python-version }} pytest tests/unit tests/golden tests/api \
            --cov=topicvisexplorer \
            --cov-report=term-missing \
            --cov-report=xml \
            -q
        env:
          PYTHONHASHSEED: "0"
      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          fail_ci_if_error: false

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install npm deps
        run: npm ci --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npx tsc --noEmit
      - name: Build bundle
        run: npm run build
      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/topicvisexplorer/web/dist/
          if-no-files-found: error

  visual:
    needs: [frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install python package
        run: |
          uv python install ${{ env.CI_PYTHON }}
          uv sync --extra dev --python ${{ env.CI_PYTHON }}
      - name: Install npm deps
        working-directory: frontend
        run: npm ci --no-audit --no-fund
      - name: Build bundle
        working-directory: frontend
        run: npm run build
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run visual regression tests
        working-directory: frontend
        run: npx playwright test
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          if-no-files-found: ignore

  build:
    needs: [lint, test, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install Python + dev deps
        run: |
          uv python install ${{ env.CI_PYTHON }}
          uv sync --extra dev --python ${{ env.CI_PYTHON }}
      - name: Build frontend bundle (wheel ships it)
        working-directory: frontend
        run: |
          npm ci --no-audit --no-fund
          npm run build
      - name: Build wheel + sdist
        run: uv build
      - name: Check distribution metadata
        run: uv run --python ${{ env.CI_PYTHON }} --with twine twine check dist/*
      - name: Verify bundle is in the wheel
        run: |
          uv run --python ${{ env.CI_PYTHON }} python -c "
          import zipfile, glob, sys
          whl = glob.glob('dist/*.whl')[0]
          names = zipfile.ZipFile(whl).namelist()
          required = ['topicvisexplorer/web/dist/tve.js',
                      'topicvisexplorer/web/dist/tve.css',
                      'topicvisexplorer/web/legacy/templates/index.html',
                      'topicvisexplorer/web/legacy/templates/index_v1.html']
          missing = [n for n in required if n not in names]
          if missing:
              sys.exit('Missing from wheel: ' + ', '.join(missing))
          print('Wheel contains all expected web/ artifacts.')
          "
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
