site_name: TopicVisExplorer
site_description: Interactive topic-modeling visualization — split, merge, compare, and curate topics across corpora.
site_url: https://gonzalezf.github.io/TopicVisExplorer/
repo_url: https://github.com/gonzalezf/TopicVisExplorer
repo_name: gonzalezf/TopicVisExplorer
edit_uri: edit/main/docs/
copyright: Copyright &copy; Felipe Gonzalez. BSD-3-Clause.

docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            separate_signature: true
            show_signature_annotations: true
            docstring_style: google
            merge_init_into_class: true
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Tutorial: tutorial.md
  - Guides:
      - Edit operations: edit-ops.md
      - Coherence metrics: coherence.md
      - Extending: extending.md
      - User study (public data): user_study.md
      - Migration from v0.1: migration.md
  - API reference:
      - Overview: reference/index.md
      - prepare: reference/prepare.md
      - operations: reference/operations.md
      - models: reference/models.md
      - coherence: reference/coherence.md
      - similarity: reference/similarity.md
  - Changelog: changelog.md
  - Roadmap: roadmap.md
